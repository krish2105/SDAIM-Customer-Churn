# Streamlit is pinned to its light base theme so widget internals render
# predictably. The application's own light/dark palettes are applied on top by
# deploy/theme.py, driven by the in-app toggle. Without this pin, Streamlit
# would follow the operating system's colour scheme and fight the toggle.

[theme]
base = "light"
primaryColor = "#1E40AF"
backgroundColor = "#F4F6FA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#0F172A"

[client]
toolbarMode = "minimal"
showErrorDetails = false

[browser]
gatherUsageStats = false

[server]
headless = true
# XSRF protection is kept on, which requires CORS restrictions to remain enabled.
# Setting enableCORS = false here would conflict and Streamlit would override it
# back to true with a warning, so it is deliberately left at its default.
enableXsrfProtection = true
